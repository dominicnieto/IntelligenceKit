  name: Sync upstream
  on:
    schedule:
      - cron: '0 6 * * *'
    workflow_dispatch:

  jobs:
    sync:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
          with:
            fetch-depth: 0
        - run: |
            git remote add upstream https://github.com/christopherkarani/Swarm.git
            git fetch upstream
            git merge --ff-only upstream/main
            git push
